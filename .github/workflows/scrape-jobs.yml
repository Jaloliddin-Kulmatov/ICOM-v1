name: Scrape Internship Jobs

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC daily
    - cron: "0 18 * * *"  # 6 PM UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          ICOM_API_URL: ${{ secrets.ICOM_API_URL }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
          MAX_PER_RUN: "15"
          WANTED_QUERY: "인턴"
          WANTED_LIMIT: "40"
        run: python scraper/daemon.py
