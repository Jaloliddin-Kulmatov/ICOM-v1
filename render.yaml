services:
  # ── Flask Backend ─────────────────────────────────────────────
  - type: web
    name: icom-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false          # you fill this in the Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your frontend Render URL after deploying
      - key: DATABASE_URL
        fromDatabase:
          name: icom-db
          property: connectionString

  # ── Next.js Frontend ──────────────────────────────────────────
  - type: web
    name: icom-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: NEXT_PUBLIC_API_URL
        sync: false          # set to your backend Render URL after deploying

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: icom-db
    plan: free
    databaseName: icom
    user: icom
