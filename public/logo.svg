<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Globe body -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Globe grid lines, clipped to circle -->
  <g clip-path="url(#clip)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" fill="none">
    <!-- Latitude lines -->
    <line x1="2" y1="20" x2="62" y2="20"/>
    <line x1="2" y1="32" x2="62" y2="32"/>
    <line x1="2" y1="44" x2="62" y2="44"/>
    <!-- Longitude ellipses -->
    <ellipse cx="32" cy="32" rx="11" ry="30"/>
    <ellipse cx="32" cy="32" rx="22" ry="30"/>
  </g>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Radial shine -->
  <circle cx="32" cy="32" r="30" fill="url(#shine)"/>

  <!-- IC text -->
  <text
    x="32"
    y="39"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="21"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >IC</text>
</svg>
